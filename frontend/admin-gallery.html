<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gallery | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-xl flex flex-col h-full hidden md:flex z-20 relative">
        <div class="p-6 text-xl font-extrabold text-yellow-700 flex items-center gap-3 border-b border-gray-100">
            <i class="fa-solid fa-campground text-2xl"></i>
            Aamin Admin
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-6 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            
            <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-calendar-check w-5"></i> Bookings
            </a>

            <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-bed w-5"></i> Manage Rooms
            </a>

            <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white shadow-md font-bold">
                <i class="fa-solid fa-images w-5"></i> Gallery Edit
            </a>

            <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-envelope w-5"></i> Messages
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100 mt-auto">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition cursor-pointer">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50">
        
        <header class="bg-white shadow-sm px-8 py-5 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-2xl font-bold text-gray-800">Manage Gallery</h2>
            <div class="flex items-center gap-4">
                <span class="text-gray-600 font-medium">Hello, Admin</span>
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">
                    A
                </div>
            </div>
        </header>

        <div class="p-8 flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                    <h3 id="formTitle" class="text-xl font-bold mb-6 text-gray-800 border-b pb-3">Add New Photo</h3>
                    
                    <form id="galleryForm" class="space-y-5">
                        <input type="hidden" id="photoId"> 
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Image URL</label>
                            <input type="url" id="image" placeholder="https://..." required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition">
                            <p class="text-xs text-gray-400 mt-2"><i class="fa-solid fa-circle-info"></i> Paste a direct link to the image.</p>
                        </div>
                        
                        <div class="pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-yellow-600 text-white font-bold p-3 rounded-xl hover:bg-yellow-700 transition shadow-md">
                                Add Photo
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="w-full mt-3 bg-gray-200 text-gray-700 font-bold p-3 rounded-xl hover:bg-gray-300 transition hidden">
                                Cancel Edit
                            </button>
                        </div>
                    </form>
                    <div id="msg" class="mt-4 text-center font-bold"></div>
                </div>
            </div>

            <div class="w-full lg:w-2/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-3">Existing Photos</h3>
                    
                    <div id="galleryList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        <p class="text-gray-500 col-span-full">Fetching photos...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isEditing = false;
        let allPhotos = [];

        // 1. Fetch and Display Photos
        async function loadGallery() {
            const container = document.getElementById('galleryList');
            try {
                const res = await fetch('/api/gallery');
                allPhotos = await res.json();

                container.innerHTML = '';
                if (!Array.isArray(allPhotos) || allPhotos.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                            <i class="fa-solid fa-image text-4xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium">No photos found. Add your first photo!</p>
                        </div>`;
                    return;
                }

                allPhotos.forEach(photo => {
                    const photoId = photo._id || photo.id; 
                    
                    container.innerHTML += `
                        <div class="relative group rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-gray-100 h-48">
                            <img src="${photo.image}" class="w-full h-full object-cover">
                            
                            <div class="absolute inset-0 bg-black bg-opacity-60 flex flex-col justify-center items-center opacity-0 group-hover:opacity-100 transition duration-300 gap-3">
                                <button onclick="editPhoto('${photoId}')" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-50 transition w-32 shadow-lg">
                                    <i class="fa-solid fa-pen"></i> Edit
                                </button>
                                <button onclick="deletePhoto('${photoId}')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700 transition w-32 shadow-lg">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<p class="text-red-500 col-span-full">Error loading photos from server.</p>';
            }
        }

        // 2. Add or Update Photo
        document.getElementById('galleryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            const imageUrl = document.getElementById('image').value;
            const photoId = document.getElementById('photoId').value;

            try {
                let res;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

                if (isEditing) {
                    res = await fetch(`/api/gallery/${photoId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageUrl })
                    });
                } else {
                    res = await fetch('/api/gallery', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageUrl })
                    });
                }

                if (res.ok) {
                    msgBox.textContent = isEditing ? "Photo Updated!" : "Photo Added!";
                    msgBox.className = "mt-4 text-sm text-center font-bold text-green-700 bg-green-100 p-3 rounded-xl";
                    cancelEdit();
                    loadGallery(); 
                    setTimeout(() => msgBox.textContent = '', 3000);
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                msgBox.textContent = "Error saving photo!";
                msgBox.className = "mt-4 text-sm text-center font-bold text-red-700 bg-red-100 p-3 rounded-xl";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isEditing ? 'Update Photo' : 'Add Photo';
            }
        });

        // 3. Setup Edit Mode
        function editPhoto(id) {
            const photo = allPhotos.find(p => (p._id || p.id) === id);
            if (!photo) return;

            document.getElementById('photoId').value = id;
            document.getElementById('image').value = photo.image;

            isEditing = true;
            document.getElementById('formTitle').textContent = "Edit Photo URL";
            document.getElementById('submitBtn').innerHTML = 'Update Photo';
            document.getElementById('submitBtn').classList.replace('bg-yellow-600', 'bg-blue-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-yellow-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 4. Cancel Edit Mode
        function cancelEdit() {
            isEditing = false;
            document.getElementById('galleryForm').reset();
            document.getElementById('photoId').value = '';
            
            document.getElementById('formTitle').textContent = "Add New Photo";
            document.getElementById('submitBtn').innerHTML = 'Add Photo';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-yellow-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-blue-700', 'hover:bg-yellow-700');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // 5. Delete Photo
        async function deletePhoto(id) {
            if (!confirm("Are you sure you want to delete this photo from the gallery?")) return;

            try {
                const res = await fetch(`/api/gallery/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadGallery(); 
                } else {
                    alert("Failed to delete photo.");
                }
            } catch (error) {
                alert("Connection error while deleting.");
            }
        }

        // Initialize Data
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
