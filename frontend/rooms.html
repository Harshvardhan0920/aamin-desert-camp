<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Rooms | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-yellow-700">
                <i class="fa-solid fa-campground"></i>
                Aamin Desert Camp
            </a>

            <nav class="hidden md:flex items-center space-x-6 font-semibold text-gray-600">
                <a href="index.html" class="hover:text-yellow-600 transition">Home</a>
                <a href="about.html" class="hover:text-yellow-600 transition">About Us</a>
                <a href="gallery.html" class="hover:text-yellow-600 transition">Gallery</a>
                <a href="rooms.html" class="text-yellow-600 border-b-2 border-yellow-600 pb-1">Rooms</a>
                <a href="contact.html" class="hover:text-yellow-600 transition">Contact</a>
                <a href="booking.html" class="bg-yellow-600 text-white px-6 py-2 rounded-full hover:bg-yellow-700 transition shadow-md">Book Now</a>
            </nav>

            <button id="menu-btn" class="md:hidden text-2xl text-gray-700 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t pb-4 px-4 flex flex-col space-y-4 font-semibold text-gray-600">
            <a href="index.html" class="block pt-3">Home</a>
            <a href="about.html" class="block">About Us</a>
            <a href="gallery.html" class="block">Gallery</a>
            <a href="rooms.html" class="block text-yellow-600">Rooms</a>
            <a href="contact.html" class="block">Contact</a>
            <a href="booking.html" class="block bg-yellow-600 text-white text-center py-2 rounded-md shadow">Book Now</a>
        </div>
    </header>

    <main class="flex-grow w-full">
        <div class="bg-yellow-800 text-white py-16 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-3">Our Luxury Tents</h1>
            <p class="text-lg opacity-90">Experience the magic of the desert under the stars...</p>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-12">
            <div id="roomsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-full text-center py-12">
                    <i class="fa-solid fa-spinner fa-spin text-5xl text-yellow-600 mb-4"></i>
                    <p class="text-gray-500 font-medium text-lg">Fetching luxury tents...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
        <p>&copy; 2026 Aamin Desert Camp. All rights reserved.</p>
    </footer>

    <script>
        // 1. Mobile Menu Toggle
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobileMenu');

            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
            
            // Call API to load rooms
            loadRooms();
        });

        // 2. Fetch Rooms from Backend
        async function loadRooms() {
            const container = document.getElementById('roomsContainer');
            
            try {
                // API call (Backend se data le raha hai)
                const res = await fetch('/api/rooms'); 
                
                if (!res.ok) {
                    throw new Error("Server error: " + res.status);
                }

                const rooms = await res.json();
                container.innerHTML = ''; // Loading text hatao

                // Agar Database mein rooms hain
                if (Array.isArray(rooms) && rooms.length > 0) {
                    rooms.forEach(room => {
                        // Agar image nahi hai toh ek default image dikhayega
                        const imageSrc = room.image || 'https://images.unsplash.com/photo-1510673398516-728b6d498686?w=800';
                        
                        container.innerHTML += `
                            <div class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-2xl transition-shadow duration-300 flex flex-col">
                                <img src="${imageSrc}" alt="${room.name}" class="w-full h-64 object-cover">
                                <div class="p-6 flex flex-col flex-grow">
                                    <div class="flex justify-between items-start mb-4">
                                        <h3 class="text-2xl font-bold text-gray-800">${room.name}</h3>
                                        <span class="text-yellow-600 font-extrabold text-xl whitespace-nowrap">₹${room.price}</span>
                                    </div>
                                    <p class="text-gray-600 mb-6 flex-grow">${room.description}</p>
                                    <a href="booking.html" class="block w-full text-center bg-yellow-600 text-white font-bold py-3 rounded-lg hover:bg-yellow-700 transition transform hover:-translate-y-1">
                                        Book This Tent
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    // Agar Database empty hai
                    container.innerHTML = `
                        <div class="col-span-full text-center py-16">
                            <i class="fa-solid fa-campground text-7xl text-gray-300 mb-4"></i>
                            <h3 class="text-2xl font-bold text-gray-700 mb-2">No Rooms Added Yet</h3>
                            <p class="text-gray-500">Please add luxury tents from your Admin Panel.</p>
                        </div>`;
                }

            } catch (error) {
                console.error("Error fetching rooms:", error);
                // Agar server crash ho gaya
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-red-50 rounded-2xl border border-red-100">
                        <i class="fa-solid fa-triangle-exclamation text-6xl text-red-400 mb-4"></i>
                        <h3 class="text-2xl font-bold text-gray-800 mb-2">Oops! Connection Error</h3>
                        <p class="text-gray-500">Server se connect nahi ho paya. Please check backend logs.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
