<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-yellow-700">
                <i class="fa-solid fa-campground"></i>
                Aamin Desert Camp
            </a>

            <nav class="hidden md:flex items-center space-x-6 font-semibold text-gray-600">
                <a href="index.html" class="hover:text-yellow-600 transition">Home</a>
                <a href="about.html" class="hover:text-yellow-600 transition">About Us</a>
                <a href="gallery.html" class="hover:text-yellow-600 transition">Gallery</a>
                <a href="rooms.html" class="hover:text-yellow-600 transition">Rooms</a>
                <a href="contact.html" class="text-yellow-600 border-b-2 border-yellow-600 pb-1">Contact</a>
                <a href="booking.html" class="bg-yellow-600 text-white px-6 py-2 rounded-full hover:bg-yellow-700 transition shadow-md">Book Now</a>
            </nav>

            <button id="menu-btn" class="md:hidden text-2xl text-gray-700 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t pb-4 px-4 flex flex-col space-y-4 font-semibold text-gray-600">
            <a href="index.html" class="block pt-3">Home</a>
            <a href="about.html" class="block">About Us</a>
            <a href="gallery.html" class="block">Gallery</a>
            <a href="rooms.html" class="block">Rooms</a>
            <a href="contact.html" class="block text-yellow-600">Contact</a>
            <a href="booking.html" class="block bg-yellow-600 text-white text-center py-2 rounded-md shadow">Book Now</a>
        </div>
    </header>

    <div class="bg-yellow-800 text-white py-16 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-3">Get in Touch</h1>
        <p class="text-lg opacity-90">We'd love to hear from you. Drop us a message!</p>
    </div>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-12 w-full">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl border border-gray-100">
            <form id="contactForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Your Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Email Address</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition" placeholder="john@example.com">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Subject</label>
                    <input type="text" id="subject" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition" placeholder="How can we help?">
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Your Message</label>
                    <textarea id="message" rows="5" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition resize-none" placeholder="Write your message here..."></textarea>
                </div>

                <div>
                    <button type="submit" id="submitBtn" class="w-full bg-yellow-600 text-white font-bold py-4 rounded-lg hover:bg-yellow-700 transition shadow-lg flex justify-center items-center gap-2">
                        <span>Send Message</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                    <div id="statusMessage" class="mt-4 text-center font-medium hidden rounded-lg py-3"></div>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
        <p>&copy; 2026 Aamin Desert Camp. All rights reserved.</p>
    </footer>

    <script>
        // 1. Mobile Menu Toggle
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobileMenu');

            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });

        // 2. Form Submission Logic
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Page refresh roko

            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');
            
            // Button ko loading state mein daalo
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            statusMessage.classList.add('hidden'); // Purane message chhupao

            // Form ka data jama karo
            const contactData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                // Backend par data bhejo (Ensure tumhara backend /api/contact route handle karta ho)
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(contactData)
                });

                if (res.ok) {
                    // Success Message
                    statusMessage.textContent = "Thank you! Your message has been sent successfully.";
                    statusMessage.className = "mt-4 text-center font-medium text-green-700 bg-green-100 rounded-lg py-3 block";
                    document.getElementById('contactForm').reset(); // Form clear karo
                } else {
                    // Backend Error Message
                    statusMessage.textContent = "Oops! Something went wrong on the server. Please try again.";
                    statusMessage.className = "mt-4 text-center font-medium text-red-700 bg-red-100 rounded-lg py-3 block";
                }
            } catch (error) {
                // Network Error Message
                console.error("Error:", error);
                statusMessage.textContent = "Connection error. Please check your internet or backend server.";
                statusMessage.className = "mt-4 text-center font-medium text-red-700 bg-red-100 rounded-lg py-3 block";
            } finally {
                // Button wapas normal karo
                submitBtn.innerHTML = '<span>Send Message</span><i class="fa-solid fa-paper-plane"></i>';
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
