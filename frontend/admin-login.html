<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Login | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script>
        if (localStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>

        <div class="text-center mb-8 mt-2">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-yellow-50 text-yellow-600 rounded-full mb-4 shadow-inner">
                <i class="fa-solid fa-campground text-3xl"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 tracking-tight">Admin Portal</h1>
            <p class="text-gray-500 mt-2 text-sm md:text-base font-medium">Secure Access for Management</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" required autocomplete="off" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:bg-white outline-none transition text-gray-800 font-medium" placeholder="Enter admin username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:bg-white outline-none transition text-gray-800 font-medium" placeholder="••••••••">
                </div>
            </div>

            <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 p-3 rounded-xl text-center font-bold shadow-sm"></div>

            <button type="submit" id="loginBtn" class="w-full bg-yellow-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-yellow-700 transition duration-300 shadow-lg hover:shadow-xl flex justify-center items-center gap-2 transform active:scale-95">
                <span>Secure Login</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-gray-100">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-yellow-600 transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Main Website
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            errorMsg.classList.add('hidden');

            try {
                // Backend se verify karo
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (res.ok) {
                    // 🎉 YAHAN SECURITY TOKEN SET HOTA HAI 🎉
                    localStorage.setItem('adminAuth', 'true'); 
                    
                    loginBtn.innerHTML = '<i class="fa-solid fa-shield-check"></i> Access Granted!';
                    loginBtn.classList.replace('bg-yellow-600', 'bg-green-600');
                    loginBtn.classList.replace('hover:bg-yellow-700', 'hover:bg-green-700');
                    
                    // Redirect to Dashboard
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 800);
                } else {
                    // Password Galat hai
                    const data = await res.json();
                    errorMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation mr-1"></i> ${data.error || "Invalid Credentials!"}`;
                    errorMsg.classList.remove('hidden');
                    
                    // Button wapas normal karo
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<span>Secure Login</span><i class="fa-solid fa-arrow-right-to-bracket"></i>';
                }
            } catch (error) {
                errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Server connection error!`;
                errorMsg.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Secure Login</span><i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        });
    </script>
</body>
</html>
