<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold text-center text-yellow-700 mb-6">Admin Login</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" required class="w-full px-4 py-2 border rounded-lg">
            <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-2 border rounded-lg">
            <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-2 rounded-lg hover:bg-yellow-700">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            if(res.ok) {
                localStorage.setItem('isAdmin', 'true'); // Login saved
                window.location.href = 'admin-dashboard.html';
            } else {
                alert("Galat password bhai!");
            }
        });
    </script>
</body>
</html>
