<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="inline-block bg-yellow-100 p-4 rounded-full mb-4">
                <i class="fa-solid fa-campground text-4xl text-yellow-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Admin Portal</h1>
            <p class="text-gray-500 mt-2">Aamin Desert Camp Management</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent outline-none transition" placeholder="Enter admin username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent outline-none transition" placeholder="••••••••">
                </div>
            </div>

            <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-100 p-3 rounded-lg text-center font-medium"></div>

            <button type="submit" id="loginBtn" class="w-full bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-yellow-700 transition duration-300 shadow-md flex justify-center items-center gap-2">
                <span>Secure Login</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-gray-500 hover:text-yellow-600 transition"><i class="fa-solid fa-arrow-left"></i> Back to Main Website</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Page refresh hone se roko

            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            errorMsg.classList.add('hidden');

            try {
                // Backend se verify karo
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (res.ok) {
                    // Agar login success ho gaya toh Admin Rooms page par bhej do
                    loginBtn.innerHTML = '<i class="fa-solid fa-check"></i> Success!';
                    loginBtn.classList.replace('bg-yellow-600', 'bg-green-600');
                    
                    setTimeout(() => {
                        window.location.href = 'admin-rooms.html'; // Tumhare dashboard/rooms page ka naam
                    }, 1000);
                } else {
                    // Agar password galat hai
                    const data = await res.json();
                    errorMsg.textContent = data.error || "Invalid Credentials!";
                    errorMsg.classList.remove('hidden');
                    
                    // Button wapas normal karo
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<span>Secure Login</span><i class="fa-solid fa-arrow-right-to-bracket"></i>';
                }
            } catch (error) {
                errorMsg.textContent = "Server connection error!";
                errorMsg.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Secure Login</span><i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        });
    </script>
</body>
</html>
