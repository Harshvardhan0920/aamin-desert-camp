<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script>
        if (localStorage.getItem('adminAuth') !== 'true') {
            alert("Aap admin nahi ho! Pehle login karo.");
            window.location.href = 'admin-login.html';
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <div class="md:hidden flex justify-between items-center bg-white p-4 shadow-md absolute w-full z-30">
        <div class="text-lg font-extrabold text-yellow-700 flex items-center gap-2">
            <i class="fa-solid fa-campground"></i> Aamin Admin
        </div>
        <button id="mobileMenuBtn" class="text-2xl text-gray-700 focus:outline-none">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div id="mobileSidebar" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden">
        <aside class="w-64 bg-white shadow-xl flex flex-col h-full transform transition-transform">
            <div class="p-4 flex justify-end border-b border-gray-100">
                <button id="closeMenuBtn" class="text-2xl text-gray-500 hover:text-red-500 transition">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 mb-2 rounded-xl bg-blue-50 text-blue-700 border border-blue-100 font-bold">
                    <i class="fa-solid fa-globe w-5"></i> View Website
                </a>
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-chart-line w-5"></i> Dashboard
                </a>
                <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-calendar-check w-5"></i> Bookings
                </a>
                <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white font-bold shadow-md">
                    <i class="fa-solid fa-bed w-5"></i> Manage Rooms
                </a>
                <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-images w-5"></i> Gallery Edit
                </a>
                <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-star w-5"></i> Manage Reviews
                </a>
                <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-envelope w-5"></i> Messages
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition">
                    <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
                </button>
            </div>
        </aside>
    </div>

    <aside class="w-64 bg-white shadow-xl flex flex-col h-full hidden md:flex z-20 relative border-r border-gray-100">
        <div class="p-6 text-xl font-extrabold text-yellow-700 flex items-center gap-3 border-b border-gray-100">
            <i class="fa-solid fa-campground text-2xl"></i>
            Aamin Admin
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-6 overflow-y-auto">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 mb-4 rounded-xl bg-blue-50 text-blue-700 border border-blue-100 hover:bg-blue-600 hover:text-white transition font-bold shadow-sm">
                <i class="fa-solid fa-globe w-5"></i> View Website
            </a>
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-calendar-check w-5"></i> Bookings
            </a>
            <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white shadow-md font-bold">
                <i class="fa-solid fa-bed w-5"></i> Manage Rooms
            </a>
            <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-images w-5"></i> Gallery Edit
            </a>
            <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-star w-5"></i> Manage Reviews
            </a>
            <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-envelope w-5"></i> Messages
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100 mt-auto">
            <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50 pt-16 md:pt-0">
        
        <header class="bg-white shadow-sm px-4 md:px-8 py-5 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800">Manage Rooms</h2>
            <div class="flex items-center gap-4">
                <span class="text-gray-600 font-medium hidden sm:block">Hello, Admin</span>
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">A</div>
            </div>
        </header>

        <div class="p-4 md:p-8 flex flex-col lg:flex-row gap-6 md:gap-8">
            
            <div class="w-full lg:w-1/3">
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-20 md:top-24">
                    <h3 id="formTitle" class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-gray-800 border-b pb-3">Add New Room</h3>
                    
                    <form id="roomForm" class="space-y-4">
                        <input type="hidden" id="roomId"> 
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Tent Type / Name</label>
                            <input type="text" id="name" placeholder="e.g. Royal Swiss Tent" required class="w-full p-2.5 md:p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition text-sm md:text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Price per night (₹)</label>
                            <input type="number" id="price" placeholder="e.g. 5000" required class="w-full p-2.5 md:p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition text-sm md:text-base">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Room Image</label>
                            <input type="file" id="imageFile" accept="image/*" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-xl outline-none transition cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100 text-sm">
                            
                            <div id="previewContainer" class="hidden mt-3 border rounded-xl overflow-hidden bg-gray-50 relative">
                                <img id="imagePreview" src="" class="w-full h-32 object-cover">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Description</label>
                            <textarea id="description" rows="3" placeholder="Features of the tent..." required class="w-full p-2.5 md:p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition resize-none text-sm md:text-base"></textarea>
                        </div>
                        
                        <div class="pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-yellow-600 text-white font-bold p-3 rounded-xl hover:bg-yellow-700 transition shadow-md text-sm md:text-base">
                                Add Room
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="w-full mt-3 bg-gray-200 text-gray-700 font-bold p-3 rounded-xl hover:bg-gray-300 transition hidden text-sm md:text-base">
                                Cancel Edit
                            </button>
                        </div>
                    </form>
                    <div id="msg" class="mt-4 text-center font-bold text-sm"></div>
                </div>
            </div>

            <div class="w-full lg:w-2/3">
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-gray-800 border-b pb-3">Existing Tents</h3>
                    
                    <div id="roomsList" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        <p class="text-gray-500 col-span-full">Fetching room data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Mobile Menu Toggle
        document.getElementById('mobileMenuBtn').addEventListener('click', () => { document.getElementById('mobileSidebar').classList.remove('hidden'); });
        document.getElementById('closeMenuBtn').addEventListener('click', () => { document.getElementById('mobileSidebar').classList.add('hidden'); });

        function logoutAdmin() {
            localStorage.removeItem('adminAuth');
            window.location.href = 'index.html';
        }

        let isEditing = false;
        let allRooms = [];

        // Preview Image before upload
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const preview = document.getElementById('imagePreview');
            preview.src = URL.createObjectURL(file);
            document.getElementById('previewContainer').classList.remove('hidden');
        });

        // Load Rooms from DB
        async function loadRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '<p class="text-gray-500 col-span-full text-center py-4"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...</p>';
            
            try {
                const res = await fetch('/api/rooms');
                allRooms = await res.json();
                container.innerHTML = '';
                
                if (!Array.isArray(allRooms) || allRooms.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                            <i class="fa-solid fa-tent text-4xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium">No rooms found. Add your first tent!</p>
                        </div>`;
                    return;
                }

                allRooms.forEach(room => {
                    const roomId = room._id || room.id; 
                    // Safely handle missing images
                    const imgSource = room.image ? room.image : 'https://via.placeholder.com/400x300?text=No+Image';

                    container.innerHTML += `
                        <div class="border border-gray-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition bg-white flex flex-col h-full">
                            <img src="${imgSource}" class="w-full h-40 md:h-48 object-cover">
                            <div class="p-4 md:p-5 flex flex-col flex-grow">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-bold text-base md:text-lg text-gray-800">${room.name}</h4>
                                    <span class="bg-green-100 text-green-700 font-extrabold px-2 py-1 rounded-full text-xs md:text-sm whitespace-nowrap">₹${room.price}</span>
                                </div>
                                <p class="text-gray-500 text-xs md:text-sm mb-4 line-clamp-2 flex-grow">${room.description}</p>
                                <div class="flex gap-2 mt-auto">
                                    <button onclick="editRoom('${roomId}')" class="flex-1 bg-blue-50 text-blue-600 border border-blue-100 py-1.5 md:py-2 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white transition"><i class="fa-solid fa-pen"></i> Edit</button>
                                    <button onclick="deleteRoom('${roomId}')" class="flex-1 bg-red-50 text-red-600 border border-red-100 py-1.5 md:py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition"><i class="fa-solid fa-trash"></i> Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<p class="text-red-500 col-span-full text-center">Error loading data from server.</p>';
            }
        }

        // Add or Update Room using FormData
        document.getElementById('roomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            const roomId = document.getElementById('roomId').value;
            const fileInput = document.getElementById('imageFile');

            if (!isEditing && fileInput.files.length === 0) {
                msgBox.textContent = "Please select a room image first!";
                msgBox.className = "mt-4 text-sm text-center font-bold text-red-700 bg-red-100 p-3 rounded-xl";
                return;
            }

            // Create FormData object
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('description', document.getElementById('description').value);
            if (fileInput.files.length > 0) {
                formData.append('image', fileInput.files[0]);
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

                const url = isEditing ? `/api/rooms/${roomId}` : '/api/rooms';
                const method = isEditing ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    body: formData // No Content-Type header needed for FormData
                });

                if (res.ok) {
                    msgBox.textContent = isEditing ? "Room Updated Successfully!" : "Room Added Successfully!";
                    msgBox.className = "mt-4 text-sm text-center font-bold text-green-700 bg-green-100 p-3 rounded-xl";
                    cancelEdit(); 
                    loadRooms();  
                    setTimeout(() => msgBox.textContent = '', 3000);
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                msgBox.textContent = "Error saving room details!";
                msgBox.className = "mt-4 text-sm text-center font-bold text-red-700 bg-red-100 p-3 rounded-xl";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isEditing ? 'Update Room' : 'Add Room';
            }
        });

        // Edit Mode
        function editRoom(id) {
            const room = allRooms.find(r => (r._id || r.id) === id);
            if (!room) return;

            document.getElementById('roomId').value = id;
            document.getElementById('name').value = room.name;
            document.getElementById('price').value = room.price;
            document.getElementById('description').value = room.description;
            
            if (room.image) {
                document.getElementById('imagePreview').src = room.image;
                document.getElementById('previewContainer').classList.remove('hidden');
            }

            isEditing = true;
            document.getElementById('formTitle').textContent = "Edit Tent Details";
            document.getElementById('submitBtn').innerHTML = 'Update Room';
            document.getElementById('submitBtn').classList.replace('bg-yellow-600', 'bg-blue-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-yellow-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cancel Edit
        function cancelEdit() {
            isEditing = false;
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('imageFile').value = ''; 
            
            document.getElementById('formTitle').textContent = "Add New Room";
            document.getElementById('submitBtn').innerHTML = 'Add Room';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-yellow-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-blue-700', 'hover:bg-yellow-700');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // Delete Room
        async function deleteRoom(id) {
            if (!confirm("Are you sure you want to delete this room? This cannot be undone.")) return;
            try {
                const res = await fetch(`/api/rooms/${id}`, { method: 'DELETE' });
                if (res.ok) loadRooms(); 
                else alert("Failed to delete room from server.");
            } catch (error) { alert("Connection error while deleting."); }
        }

        document.addEventListener('DOMContentLoaded', loadRooms);
    </script>
</body>
</html>
