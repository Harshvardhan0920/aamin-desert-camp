<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-gear"></i> Admin Dashboard</h1>
            <a href="index.html" class="text-yellow-400 hover:text-yellow-300"><i class="fa-solid fa-globe"></i> View Website</a>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">
        
        <div class="w-full lg:w-1/3">
            <div class="bg-white p-6 rounded-xl shadow-lg sticky top-6">
                <h2 id="formTitle" class="text-2xl font-bold mb-6 text-gray-800">Add New Room</h2>
                
                <form id="roomForm" class="space-y-4">
                    <input type="hidden" id="roomId"> 
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Room Name</label>
                        <input type="text" id="name" placeholder="e.g. Royal Tent" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price (₹)</label>
                        <input type="number" id="price" placeholder="e.g. 5000" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                        <input type="url" id="image" placeholder="https://..." required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="description" rows="3" placeholder="Room details..." required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition">
                        <i class="fa-solid fa-plus"></i> Add Room
                    </button>
                    <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="w-full bg-gray-400 text-white font-bold p-3 rounded-lg hover:bg-gray-500 transition hidden">
                        Cancel Edit
                    </button>
                </form>
                <div id="msg" class="mt-4 text-center font-bold"></div>
            </div>
        </div>

        <div class="w-full lg:w-2/3">
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Existing Rooms</h2>
                
                <div id="roomsList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <p class="text-gray-500">Loading rooms...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isEditing = false;
        let allRooms = [];

        // 1. Load Rooms (READ)
        async function loadRooms() {
            const container = document.getElementById('roomsList');
            try {
                const res = await fetch('/api/rooms');
                allRooms = await res.json();

                container.innerHTML = '';
                if (allRooms.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 col-span-full">No rooms found. Add one!</p>';
                    return;
                }

                allRooms.forEach(room => {
                    // Mongoose normally uses _id
                    const roomId = room._id || room.id; 
                    
                    container.innerHTML += `
                        <div class="border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition">
                            <img src="${room.image}" class="w-full h-40 object-cover">
                            <div class="p-4">
                                <h3 class="font-bold text-lg">${room.name}</h3>
                                <p class="text-blue-600 font-extrabold mb-2">₹${room.price}</p>
                                <p class="text-gray-600 text-sm mb-4 line-clamp-2">${room.description}</p>
                                
                                <div class="flex gap-2">
                                    <button onclick="editRoom('${roomId}')" class="flex-1 bg-yellow-500 text-white py-2 rounded font-bold hover:bg-yellow-600">
                                        <i class="fa-solid fa-pen"></i> Edit
                                    </button>
                                    <button onclick="deleteRoom('${roomId}')" class="flex-1 bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700">
                                        <i class="fa-solid fa-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="text-red-500">Error loading rooms.</p>';
            }
        }

        // 2. Add or Update Room (CREATE / UPDATE)
        document.getElementById('roomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            
            const roomData = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value,
                description: document.getElementById('description').value
            };

            const roomId = document.getElementById('roomId').value;

            try {
                let res;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

                if (isEditing) {
                    // UPDATE Logic
                    res = await fetch(`/api/rooms/${roomId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(roomData)
                    });
                } else {
                    // CREATE Logic
                    res = await fetch('/api/rooms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(roomData)
                    });
                }

                if (res.ok) {
                    msgBox.textContent = isEditing ? "Room Updated!" : "Room Added!";
                    msgBox.className = "mt-4 text-center font-bold text-green-600 bg-green-100 p-2 rounded";
                    cancelEdit(); // Reset form
                    loadRooms();  // Refresh list
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                msgBox.textContent = "Error saving room!";
                msgBox.className = "mt-4 text-center font-bold text-red-600 bg-red-100 p-2 rounded";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isEditing ? '<i class="fa-solid fa-save"></i> Update Room' : '<i class="fa-solid fa-plus"></i> Add Room';
            }
        });

        // 3. Edit Room (Populate Form)
        function editRoom(id) {
            const room = allRooms.find(r => (r._id || r.id) === id);
            if (!room) return;

            // Form me data daalo
            document.getElementById('roomId').value = id;
            document.getElementById('name').value = room.name;
            document.getElementById('price').value = room.price;
            document.getElementById('image').value = room.image;
            document.getElementById('description').value = room.description;

            // UI change karo Update mode me
            isEditing = true;
            document.getElementById('formTitle').textContent = "Edit Room";
            document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-save"></i> Update Room';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('msg').textContent = "";
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cancel Edit
        function cancelEdit() {
            isEditing = false;
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
            
            document.getElementById('formTitle').textContent = "Add New Room";
            document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-plus"></i> Add Room';
            document.getElementById('submitBtn').classList.replace('bg-green-600', 'bg-blue-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // 4. Delete Room (DELETE)
        async function deleteRoom(id) {
            if (!confirm("Are you sure you want to delete this room? This cannot be undone.")) return;

            try {
                const res = await fetch(`/api/rooms/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("Room Deleted!");
                    loadRooms(); // Refresh list
                } else {
                    alert("Failed to delete room.");
                }
            } catch (error) {
                alert("Error deleting room.");
            }
        }

        // Run on start
        document.addEventListener('DOMContentLoaded', loadRooms);
    </script>
</body>
</html>
