<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-xl flex flex-col h-full hidden md:flex z-20 relative">
        <div class="p-6 text-xl font-extrabold text-yellow-700 flex items-center gap-3 border-b border-gray-100">
            <i class="fa-solid fa-campground text-2xl"></i>
            Aamin Admin
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-6 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-calendar-check w-5"></i> Bookings
            </a>
            <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-bed w-5"></i> Manage Rooms
            </a>
            <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-images w-5"></i> Gallery Edit
            </a>
            <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white shadow-md font-bold">
                <i class="fa-solid fa-envelope w-5"></i> Messages
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100 mt-auto">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition cursor-pointer">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50">
        
        <header class="bg-white shadow-sm px-8 py-5 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-2xl font-bold text-gray-800">Customer Inquiries</h2>
            <div class="flex items-center gap-4">
                <span class="text-gray-600 font-medium">Hello, Admin</span>
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">
                    A
                </div>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                    <h3 class="text-xl font-bold text-gray-800">Messages List</h3>
                    <button onclick="loadMessages()" class="text-gray-500 hover:text-yellow-600 transition">
                        <i class="fa-solid fa-rotate-right"></i> Refresh
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider">
                                <th class="p-4 font-semibold">Sender</th>
                                <th class="p-4 font-semibold">Message Detail</th>
                                <th class="p-4 font-semibold">Date</th>
                                <th class="p-4 font-semibold text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="messagesList" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="p-8 text-center text-gray-500">Loading messages...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Fetch and Display Messages
        async function loadMessages() {
            const tableBody = document.getElementById('messagesList');
            tableBody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading...</td></tr>';

            try {
                const res = await fetch('/api/messages');
                const messages = await res.json();

                tableBody.innerHTML = '';
                
                if (!Array.isArray(messages) || messages.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="4" class="p-10 text-center">
                                <i class="fa-solid fa-envelope-open text-4xl text-gray-300 mb-3"></i>
                                <p class="text-gray-500 font-medium">No messages found.</p>
                            </td>
                        </tr>`;
                    return;
                }

                messages.forEach(msg => {
                    const msgId = msg._id || msg.id;
                    const msgDate = new Date(msg.date).toLocaleString('en-IN') || 'N/A';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 align-top">
                                <div class="font-bold text-gray-800">${msg.name || 'Anonymous'}</div>
                                <div class="text-sm text-blue-600">${msg.email || 'N/A'}</div>
                            </td>
                            <td class="p-4 align-top">
                                <div class="font-bold text-gray-700 text-sm mb-1">Sub: ${msg.subject || 'No Subject'}</div>
                                <p class="text-gray-600 text-sm whitespace-pre-wrap max-w-md">${msg.message || ''}</p>
                            </td>
                            <td class="p-4 align-top text-gray-500 text-xs">
                                ${msgDate}
                            </td>
                            <td class="p-4 text-center align-top">
                                <div class="flex flex-col gap-2 justify-center items-center">
                                    <a href="mailto:${msg.email}?subject=RE: ${msg.subject}" class="w-24 bg-green-50 text-green-600 border border-green-200 py-1 rounded-lg text-xs font-bold hover:bg-green-600 hover:text-white transition text-center">
                                        <i class="fa-solid fa-reply"></i> Reply
                                    </a>
                                    <button onclick="deleteMessage('${msgId}')" class="w-24 bg-red-50 text-red-600 border border-red-200 py-1 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition">
                                        <i class="fa-solid fa-trash"></i> Delete
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">Error loading messages from server.</td></tr>';
            }
        }

        // 2. Delete Message
        async function deleteMessage(id) {
            if (!confirm("Are you sure you want to delete this message?")) return;

            try {
                const res = await fetch(`/api/messages/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadMessages(); // Refresh list
                } else {
                    alert("Failed to delete message.");
                }
            } catch (error) {
                alert("Connection error!");
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>
</html>
