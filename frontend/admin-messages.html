<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Messages | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script>
        if (localStorage.getItem('adminAuth') !== 'true') {
            alert("Aap admin nahi ho! Pehle login karo.");
            window.location.href = 'admin-login.html';
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <div class="md:hidden flex justify-between items-center bg-white p-4 shadow-md absolute w-full z-30">
        <div class="text-lg font-extrabold text-yellow-700 flex items-center gap-2">
            <i class="fa-solid fa-campground"></i> Aamin Admin
        </div>
        <button id="mobileMenuBtn" class="text-2xl text-gray-700 focus:outline-none">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div id="mobileSidebar" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden">
        <aside class="w-64 bg-white shadow-xl flex flex-col h-full transform transition-transform">
            <div class="p-4 flex justify-end border-b border-gray-100">
                <button id="closeMenuBtn" class="text-2xl text-gray-500 hover:text-red-500 transition">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 mb-2 rounded-xl bg-blue-50 text-blue-700 border border-blue-100 font-bold">
                    <i class="fa-solid fa-globe w-5"></i> View Website
                </a>
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-chart-line w-5"></i> Dashboard
                </a>
                <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-calendar-check w-5"></i> Bookings
                </a>
                <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-bed w-5"></i> Manage Rooms
                </a>
                <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-images w-5"></i> Gallery Edit
                </a>
                <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50">
                    <i class="fa-solid fa-star w-5"></i> Manage Reviews
                </a>
                <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white font-bold shadow-md">
                    <i class="fa-solid fa-envelope w-5"></i> Messages
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition">
                    <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
                </button>
            </div>
        </aside>
    </div>

    <aside class="w-64 bg-white shadow-xl flex flex-col h-full hidden md:flex z-20 relative border-r border-gray-100">
        <div class="p-6 text-xl font-extrabold text-yellow-700 flex items-center gap-3 border-b border-gray-100">
            <i class="fa-solid fa-campground text-2xl"></i>
            Aamin Admin
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-6 overflow-y-auto">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 mb-4 rounded-xl bg-blue-50 text-blue-700 border border-blue-100 hover:bg-blue-600 hover:text-white transition font-bold shadow-sm">
                <i class="fa-solid fa-globe w-5"></i> View Website
            </a>
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-calendar-check w-5"></i> Bookings
            </a>
            <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-bed w-5"></i> Manage Rooms
            </a>
            <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-images w-5"></i> Gallery Edit
            </a>
            <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition font-semibold">
                <i class="fa-solid fa-star w-5"></i> Manage Reviews
            </a>
            <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white shadow-md font-bold">
                <i class="fa-solid fa-envelope w-5"></i> Messages
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100 mt-auto">
            <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50 pt-16 md:pt-0">
        
        <header class="bg-white shadow-sm px-4 md:px-8 py-5 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800">Customer Inquiries</h2>
            <div class="flex items-center gap-4">
                <span class="text-gray-600 font-medium hidden sm:block">Hello, Admin</span>
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">A</div>
            </div>
        </header>

        <div class="p-4 md:p-8">
            
            <div id="editFormContainer" class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 hidden">
                <h3 class="text-lg md:text-xl font-bold mb-4 text-gray-800 border-b pb-3">Edit Message</h3>
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="msgId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Sender Name</label>
                            <input type="text" id="editName" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
                            <input type="email" id="editEmail" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Subject</label>
                        <input type="text" id="editSubject" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-yellow-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Message</label>
                        <textarea id="editMessageText" rows="3" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-yellow-500 text-sm resize-none"></textarea>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="submit" id="updateBtn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition shadow-sm text-sm">Update Message</button>
                        <button type="button" onclick="cancelEdit()" class="bg-gray-200 text-gray-700 font-bold py-2 px-6 rounded-lg hover:bg-gray-300 transition text-sm">Cancel</button>
                    </div>
                    <div id="formMsg" class="mt-2 text-sm font-bold text-center"></div>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 md:p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                    <h3 class="text-lg md:text-xl font-bold text-gray-800">Inbox</h3>
                    <button onclick="loadMessages()" class="text-gray-500 hover:text-yellow-600 transition text-sm md:text-base">
                        <i class="fa-solid fa-rotate-right"></i> Refresh
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-xs md:text-sm uppercase tracking-wider">
                                <th class="p-4 font-semibold w-1/4">Sender Details</th>
                                <th class="p-4 font-semibold w-1/2">Message</th>
                                <th class="p-4 font-semibold text-center w-1/4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="messagesList" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="3" class="p-8 text-center text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading messages...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Mobile Menu Toggle ---
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const mobileSidebar = document.getElementById('mobileSidebar');

        mobileMenuBtn.addEventListener('click', () => mobileSidebar.classList.remove('hidden'));
        closeMenuBtn.addEventListener('click', () => mobileSidebar.classList.add('hidden'));

        // --- Logout ---
        function logoutAdmin() {
            localStorage.removeItem('adminAuth');
            window.location.href = 'index.html';
        }

        let allMessages = [];

        // 1. Fetch & Display Messages
        async function loadMessages() {
            const tableBody = document.getElementById('messagesList');
            tableBody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading...</td></tr>';

            try {
                const res = await fetch('/api/messages');
                allMessages = await res.json();
                tableBody.innerHTML = '';
                
                if (!Array.isArray(allMessages) || allMessages.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="3" class="p-10 text-center">
                                <i class="fa-solid fa-envelope-open text-4xl text-gray-300 mb-3"></i>
                                <p class="text-gray-500 font-medium">Inbox is empty.</p>
                            </td>
                        </tr>`;
                    return;
                }

                allMessages.forEach(msg => {
                    const msgId = msg._id || msg.id;
                    const msgDate = new Date(msg.date).toLocaleDateString() || 'N/A';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 align-top">
                                <div class="font-bold text-gray-800 text-sm md:text-base">${msg.name || 'Anonymous'}</div>
                                <div class="text-xs md:text-sm text-blue-600 break-all">${msg.email || 'N/A'}</div>
                                <div class="text-xs text-gray-400 mt-1">${msgDate}</div>
                            </td>
                            <td class="p-4 align-top">
                                <div class="font-bold text-gray-700 text-sm mb-1">Sub: ${msg.subject || 'No Subject'}</div>
                                <p class="text-gray-600 text-xs md:text-sm whitespace-pre-wrap">${msg.message || ''}</p>
                            </td>
                            <td class="p-4 align-top">
                                <div class="flex flex-wrap gap-2 justify-center">
                                    <a href="mailto:${msg.email}?subject=RE: ${msg.subject}" class="bg-green-50 text-green-700 border border-green-200 py-1.5 px-3 rounded-lg text-xs font-bold hover:bg-green-600 hover:text-white transition flex items-center gap-1">
                                        <i class="fa-solid fa-reply"></i> Reply
                                    </a>
                                    <button onclick="editMessage('${msgId}')" class="bg-blue-50 text-blue-700 border border-blue-200 py-1.5 px-3 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition flex items-center gap-1">
                                        <i class="fa-solid fa-pen"></i> Edit
                                    </button>
                                    <button onclick="deleteMessage('${msgId}')" class="bg-red-50 text-red-700 border border-red-200 py-1.5 px-3 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition flex items-center gap-1">
                                        <i class="fa-solid fa-trash"></i> Delete
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-red-500">Error loading messages.</td></tr>';
            }
        }

        // 2. Setup Edit Mode
        function editMessage(id) {
            const msg = allMessages.find(m => (m._id || m.id) === id);
            if (!msg) return;

            document.getElementById('msgId').value = id;
            document.getElementById('editName').value = msg.name;
            document.getElementById('editEmail').value = msg.email;
            document.getElementById('editSubject').value = msg.subject;
            document.getElementById('editMessageText').value = msg.message;

            document.getElementById('editFormContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. Cancel Edit
        function cancelEdit() {
            document.getElementById('editForm').reset();
            document.getElementById('editFormContainer').classList.add('hidden');
        }

        // 4. Update Message (PUT)
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('msgId').value;
            const updateBtn = document.getElementById('updateBtn');
            const formMsg = document.getElementById('formMsg');

            const updatedData = {
                name: document.getElementById('editName').value,
                email: document.getElementById('editEmail').value,
                subject: document.getElementById('editSubject').value,
                message: document.getElementById('editMessageText').value
            };

            try {
                updateBtn.innerHTML = 'Updating...';
                updateBtn.disabled = true;

                const res = await fetch(`/api/messages/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                if (res.ok) {
                    formMsg.textContent = "Message Updated!";
                    formMsg.className = "mt-2 text-sm font-bold text-center text-green-600";
                    setTimeout(() => {
                        cancelEdit();
                        formMsg.textContent = "";
                        loadMessages();
                    }, 1000);
                } else {
                    throw new Error("Failed");
                }
            } catch (error) {
                formMsg.textContent = "Error updating message!";
                formMsg.className = "mt-2 text-sm font-bold text-center text-red-600";
            } finally {
                updateBtn.innerHTML = 'Update Message';
                updateBtn.disabled = false;
            }
        });

        // 5. Delete Message
        async function deleteMessage(id) {
            if (!confirm("Are you sure you want to delete this message?")) return;
            try {
                const res = await fetch(`/api/messages/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadMessages(); 
                } else {
                    alert("Failed to delete message.");
                }
            } catch (error) {
                alert("Connection error!");
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>
</html>
