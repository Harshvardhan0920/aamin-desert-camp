<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-xl flex flex-col h-full hidden md:flex z-20 relative">
        <div class="p-6 text-xl font-extrabold text-yellow-700 flex items-center gap-3 border-b border-gray-100">
            <i class="fa-solid fa-campground text-2xl"></i>
            Aamin Admin
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-6 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="admin-bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-calendar-check w-5"></i> Bookings
            </a>
            <a href="admin-rooms.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-bed w-5"></i> Manage Rooms
            </a>
            <a href="admin-gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-images w-5"></i> Gallery Edit
            </a>
            
            <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-600 text-white shadow-md font-bold">
                <i class="fa-solid fa-star w-5"></i> Manage Reviews
            </a>

            <a href="admin-messages.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 hover:text-yellow-700 transition font-semibold">
                <i class="fa-solid fa-envelope w-5"></i> Messages
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100 mt-auto">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-bold hover:bg-red-50 transition cursor-pointer">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50">
        
        <header class="bg-white shadow-sm px-8 py-5 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-2xl font-bold text-gray-800">Manage Guest Reviews</h2>
            <div class="flex items-center gap-4">
                <span class="text-gray-600 font-medium">Hello, Admin</span>
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">
                    A
                </div>
            </div>
        </header>

        <div class="p-8 flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                    <h3 id="formTitle" class="text-xl font-bold mb-6 text-gray-800 border-b pb-3">Add New Review</h3>
                    
                    <form id="reviewForm" class="space-y-5">
                        <input type="hidden" id="reviewId"> 
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Guest Name</label>
                            <input type="text" id="name" placeholder="e.g. Rahul Sharma" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Rating (Stars)</label>
                            <select id="rating" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition cursor-pointer">
                                <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
                                <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
                                <option value="3">⭐⭐⭐ (3 Stars)</option>
                                <option value="2">⭐⭐ (2 Stars)</option>
                                <option value="1">⭐ (1 Star)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Review Message</label>
                            <textarea id="text" rows="4" placeholder="What did the guest say about their stay?" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none transition resize-none"></textarea>
                        </div>
                        
                        <div class="pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-yellow-600 text-white font-bold p-3 rounded-xl hover:bg-yellow-700 transition shadow-md">
                                Post Review
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="w-full mt-3 bg-gray-200 text-gray-700 font-bold p-3 rounded-xl hover:bg-gray-300 transition hidden">
                                Cancel Edit
                            </button>
                        </div>
                    </form>
                    <div id="msg" class="mt-4 text-center font-bold"></div>
                </div>
            </div>

            <div class="w-full lg:w-2/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-3">Published Reviews</h3>
                    
                    <div id="reviewsList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <p class="text-gray-500 col-span-full">Fetching reviews...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isEditing = false;
        let allReviews = [];

        // 1. Fetch and Display Reviews
        async function loadReviews() {
            const container = document.getElementById('reviewsList');
            try {
                const res = await fetch('/api/reviews');
                allReviews = await res.json();

                container.innerHTML = '';
                if (!Array.isArray(allReviews) || allReviews.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                            <i class="fa-solid fa-star-half-stroke text-4xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium">No reviews found. Add your first review!</p>
                        </div>`;
                    return;
                }

                allReviews.forEach(review => {
                    const reviewId = review._id || review.id; 
                    
                    // Generate Stars dynamically
                    let starsHtml = '';
                    for (let i = 0; i < 5; i++) {
                        if (i < review.rating) {
                            starsHtml += '<i class="fa-solid fa-star text-yellow-500 text-sm"></i>'; // Filled Star
                        } else {
                            starsHtml += '<i class="fa-regular fa-star text-yellow-500 text-sm"></i>'; // Empty Star
                        }
                    }

                    container.innerHTML += `
                        <div class="border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition bg-white flex flex-col">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h4 class="font-bold text-lg text-gray-800">${review.name}</h4>
                                    <div class="flex gap-1 mt-1">${starsHtml}</div>
                                </div>
                            </div>
                            <p class="text-gray-600 italic text-sm mb-6 flex-grow">"${review.text}"</p>
                            
                            <div class="flex gap-3 mt-auto border-t border-gray-50 pt-4">
                                <button onclick="editReview('${reviewId}')" class="flex-1 bg-blue-50 text-blue-600 border border-blue-100 py-2 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition text-sm">
                                    <i class="fa-solid fa-pen"></i> Edit
                                </button>
                                <button onclick="deleteReview('${reviewId}')" class="flex-1 bg-red-50 text-red-600 border border-red-100 py-2 rounded-xl font-bold hover:bg-red-600 hover:text-white transition text-sm">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<p class="text-red-500">Error loading reviews from server.</p>';
            }
        }

        // 2. Add or Update Review
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            
            const reviewData = {
                name: document.getElementById('name').value,
                rating: parseInt(document.getElementById('rating').value),
                text: document.getElementById('text').value
            };

            const reviewId = document.getElementById('reviewId').value;

            try {
                let res;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

                if (isEditing) {
                    res = await fetch(`/api/reviews/${reviewId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reviewData)
                    });
                } else {
                    res = await fetch('/api/reviews', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reviewData)
                    });
                }

                if (res.ok) {
                    msgBox.textContent = isEditing ? "Review Updated!" : "Review Published!";
                    msgBox.className = "mt-4 text-sm text-center font-bold text-green-700 bg-green-100 p-3 rounded-xl";
                    cancelEdit();
                    loadReviews(); 
                    setTimeout(() => msgBox.textContent = '', 3000);
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                msgBox.textContent = "Error saving review!";
                msgBox.className = "mt-4 text-sm text-center font-bold text-red-700 bg-red-100 p-3 rounded-xl";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isEditing ? 'Update Review' : 'Post Review';
            }
        });

        // 3. Setup Edit Mode
        function editReview(id) {
            const review = allReviews.find(r => (r._id || r.id) === id);
            if (!review) return;

            document.getElementById('reviewId').value = id;
            document.getElementById('name').value = review.name;
            document.getElementById('rating').value = review.rating;
            document.getElementById('text').value = review.text;

            isEditing = true;
            document.getElementById('formTitle').textContent = "Edit Review";
            document.getElementById('submitBtn').innerHTML = 'Update Review';
            document.getElementById('submitBtn').classList.replace('bg-yellow-600', 'bg-blue-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-yellow-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 4. Cancel Edit Mode
        function cancelEdit() {
            isEditing = false;
            document.getElementById('reviewForm').reset();
            document.getElementById('reviewId').value = '';
            
            document.getElementById('formTitle').textContent = "Add New Review";
            document.getElementById('submitBtn').innerHTML = 'Post Review';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-yellow-600');
            document.getElementById('submitBtn').classList.replace('hover:bg-blue-700', 'hover:bg-yellow-700');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // 5. Delete Review
        async function deleteReview(id) {
            if (!confirm("Are you sure you want to delete this review?")) return;

            try {
                const res = await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadReviews(); 
                } else {
                    alert("Failed to delete review.");
                }
            } catch (error) {
                alert("Connection error while deleting.");
            }
        }

        // Initialize Data
        document.addEventListener('DOMContentLoaded', loadReviews);
    </script>
</body>
</html>
