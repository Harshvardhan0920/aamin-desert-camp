<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    // Agar login nahi hai, toh login page par bhej do
    if (!localStorage.getItem('isAdmin')) {
        window.location.href = 'admin-login.html';
    }
</script>
    <style>
        .sidebar-active { background-color: #ca8a04; color: white !important; border-radius: 0.5rem; }
        .star-rating { color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-xl hidden md:flex flex-col flex-shrink-0 h-full relative z-20">
    <div class="h-20 flex items-center px-6 border-b border-gray-100 bg-yellow-50">
        <a href="index.html" class="text-xl font-bold text-yellow-700 flex items-center">
            <i class="fa-solid fa-campground mr-2"></i>Aamin Admin
        </a>
    </div>
<nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="admin-dashboard.html" class="sidebar-active flex items-center px-4 py-3 font-medium transition shadow-md">
                <i class="fa-solid fa-chart-line w-6 text-center mr-3"></i>Dashboard
            </a>
            <a href="admin-bookings.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-yellow-600 rounded-lg font-medium transition">
                <i class="fa-solid fa-calendar-check w-6 text-center mr-3"></i>Bookings
            </a>
            <a href="admin-rooms.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-yellow-600 rounded-lg font-medium transition">
                <i class="fa-solid fa-bed w-6 text-center mr-3"></i>Manage Rooms
            </a>
            <a href="admin-reviews.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-yellow-600 rounded-lg font-medium transition">
                <i class="fa-solid fa-star w-6 text-center mr-3"></i>Reviews Edit
            </a>
            <a href="admin-gallery.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-yellow-600 rounded-lg font-medium transition">
                <i class="fa-solid fa-images w-6 text-center mr-3"></i>Gallery Edit
            </a>
            <a href="admin-messages.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-yellow-600 rounded-lg font-medium transition">
                <i class="fa-solid fa-envelope w-6 text-center mr-3"></i>Messages
            </a>
        </nav>
    <div class="p-4 border-t border-gray-100">
        <a href="#" onclick="localStorage.removeItem('isAdmin'); window.location.href='admin-login.html';" class="flex items-center px-4 py-3 text-red-600 hover:bg-red-50 rounded-lg font-bold transition">
    <i class="fa-solid fa-right-from-bracket w-6 text-center mr-3"></i>Logout
</a>
    </div>
</aside>
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-20 bg-white shadow-sm flex items-center px-6 lg:px-10 z-10 justify-between">
            <h1 class="text-2xl font-bold text-gray-800">Customer Reviews</h1>
            <button onclick="fetchReviews()" class="text-yellow-600 font-bold hover:text-yellow-700 bg-yellow-50 px-4 py-2 rounded-lg">
                <i class="fa-solid fa-rotate mr-1"></i> Refresh
            </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 lg:p-10 pb-20">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 border-b pb-4">Add Manual Review</h2>
                    <form id="addReviewForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">Guest Name</label>
                            <input type="text" id="revName" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:border-yellow-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">Rating (1-5)</label>
                            <select id="revRating" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:border-yellow-500 outline-none bg-white">
                                <option value="5">⭐⭐⭐⭐⭐ (5 Star)</option>
                                <option value="4">⭐⭐⭐⭐ (4 Star)</option>
                                <option value="3">⭐⭐⭐ (3 Star)</option>
                                <option value="2">⭐⭐ (2 Star)</option>
                                <option value="1">⭐ (1 Star)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">Comment</label>
                            <textarea id="revComment" rows="4" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:border-yellow-500 outline-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-3 rounded-lg hover:bg-yellow-700 transition">Save Review</button>
                    </form>
                </div>

                <div class="lg:col-span-2 space-y-4">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Manage Feedbacks</h2>
                    <div id="reviewsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <p class="text-gray-400">Loading reviews...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api/reviews";

        // 1. Review Add Karna
        document.getElementById('addReviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                guestName: document.getElementById('revName').value,
                rating: document.getElementById('revRating').value,
                comment: document.getElementById('revComment').value,
                status: 'Approved' // Admin khud daal raha hai toh auto-approve
            };

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                this.reset();
                fetchReviews();
            }
        });

        // 2. Reviews Fetch Karna
        async function fetchReviews() {
            const list = document.getElementById('reviewsList');
            try {
                const res = await fetch(API_URL);
                const reviews = await res.json();
                list.innerHTML = '';

                if(reviews.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No reviews yet.</p>';
                    return;
                }

                reviews.forEach(rev => {
                    const stars = '⭐'.repeat(rev.rating);
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="font-bold text-gray-900">${rev.guestName}</h3>
                                    <span class="text-sm">${stars}</span>
                                </div>
                                <p class="text-gray-600 text-sm italic">"${rev.comment}"</p>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-50 flex justify-end">
                                <button onclick="deleteReview('${rev._id}')" class="text-red-500 hover:text-red-700 text-sm font-bold">
                                    <i class="fa-solid fa-trash-can mr-1"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { list.innerHTML = 'Error loading reviews.'; }
        }

        // 3. Review Delete Karna
        async function deleteReview(id) {
            if(confirm("Review delete karein?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchReviews();
            }
        }

        fetchReviews();
    </script>
</body>
</html>
