<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Aamin Desert Camp</h1>
            <div class="hidden md:flex space-x-6">
                <a href="index.html" class="hover:text-yellow-600">Home</a>
                <a href="gallery.html" class="text-yellow-600 font-bold">Gallery</a>
            </div>
            <button id="menu-btn" class="md:hidden block">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-white p-4 space-y-4">
            <a href="index.html" class="block">Home</a>
            <a href="gallery.html" class="block text-yellow-600 font-bold">Gallery</a>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-16 w-full">
        <h2 class="text-4xl font-bold text-center mb-10">Our Gallery</h2>
        <div id="publicGallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <p class="text-center">Loading...</p>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-90 z-[9999] hidden flex items-center justify-center" onclick="closeLightbox()">
        <img id="lightboxImg" src="" class="max-w-full max-h-full p-4">
    </div>

    <script>
        let allImages = [];
        let currentIndex = 0;

        // 1. Load Gallery Function
        async function loadGallery() {
            const container = document.getElementById('publicGallery');
            try {
                const res = await fetch('/api/gallery');
                const photos = await res.json();

                container.innerHTML = ''; // Loading hataya

                if (Array.isArray(photos) && photos.length > 0) {
                    allImages = photos; // Global array update
                    photos.forEach((p, index) => {
                        container.innerHTML += `
                            <div class="overflow-hidden rounded-xl shadow-lg cursor-pointer" onclick="openLightbox(${index})">
                                <img src="${p.image}" alt="Camp Photo" class="w-full h-64 object-cover hover:scale-105 transition-transform duration-300">
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p class='col-span-full text-center'>No photos uploaded yet.</p>";
                }
            } catch (error) {
                container.innerHTML = "<p class='col-span-full text-center text-red-500'>Error loading photos.</p>";
            }
        }

        // 2. Mobile Menu Logic
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobileMenu');

            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
            
            // Initial call
            loadGallery();
        });

        // 3. Lightbox Logic
        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = allImages[index].image;
            lightbox.classList.remove('hidden');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }
    </script>
</body>
</html>
