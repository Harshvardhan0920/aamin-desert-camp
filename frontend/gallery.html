<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-yellow-700">
                <i class="fa-solid fa-campground"></i>
                Aamin Desert Camp
            </a>

            <nav class="hidden md:flex items-center space-x-6 font-semibold text-gray-600">
                <a href="index.html" class="hover:text-yellow-600 transition">Home</a>
                <a href="about.html" class="hover:text-yellow-600 transition">About Us</a>
                <a href="gallery.html" class="text-yellow-600 border-b-2 border-yellow-600 pb-1">Gallery</a>
                <a href="rooms.html" class="hover:text-yellow-600 transition">Rooms</a>
                <a href="contact.html" class="hover:text-yellow-600 transition">Contact</a>
                <a href="booking.html" class="bg-yellow-600 text-white px-6 py-2 rounded-full hover:bg-yellow-700 transition shadow-md">Book Now</a>
            </nav>

            <button id="menu-btn" class="md:hidden text-2xl text-gray-700 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t pb-4 px-4 flex flex-col space-y-4 font-semibold text-gray-600 absolute w-full z-50 shadow-md">
            <a href="index.html" class="block pt-3">Home</a>
            <a href="about.html" class="block">About Us</a>
            <a href="gallery.html" class="block text-yellow-600">Gallery</a>
            <a href="rooms.html" class="block">Rooms</a>
            <a href="contact.html" class="block">Contact</a>
            <a href="booking.html" class="block bg-yellow-600 text-white text-center py-2 rounded-md shadow">Book Now</a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">Our Gallery</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Take a glimpse into the magical experience of staying at Aamin Desert Camp.</p>
        </div>

        <div id="publicGallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-center col-span-full text-gray-500 font-medium py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading beautiful moments...</p>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-95 z-[9999] hidden flex items-center justify-center select-none backdrop-blur-sm">
        
        <button onclick="closeLightbox()" class="absolute top-4 right-4 md:top-8 md:right-8 text-white text-4xl hover:text-red-500 transition focus:outline-none z-50 w-12 h-12 flex items-center justify-center bg-black bg-opacity-50 rounded-full">
            &times;
        </button>

        <div class="relative flex items-center justify-between w-full h-full px-2 md:px-10">
            
            <button onclick="changeImage(-1); event.stopPropagation();" class="text-white text-3xl md:text-5xl hover:text-yellow-500 transition focus:outline-none z-50 bg-black bg-opacity-50 hover:bg-opacity-80 w-12 h-12 md:w-16 md:h-16 flex items-center justify-center rounded-full">
                &#10094;
            </button>

            <div class="flex-1 flex justify-center items-center h-full p-2 md:p-8" onclick="event.stopPropagation();">
                <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl transition-opacity duration-300">
            </div>

            <button onclick="changeImage(1); event.stopPropagation();" class="text-white text-3xl md:text-5xl hover:text-yellow-500 transition focus:outline-none z-50 bg-black bg-opacity-50 hover:bg-opacity-80 w-12 h-12 md:w-16 md:h-16 flex items-center justify-center rounded-full">
                &#10095;
            </button>
        </div>
    </div>

    <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
        <p>&copy; 2026 Aamin Desert Camp. All rights reserved.</p>
    </footer>

    <script>
        // --- Mobile Menu Toggle ---
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // --- Gallery Logic ---
        let allImages = [];
        let currentIndex = 0;

        // 1. Fetch & Display Photos
        async function loadGallery() {
            const container = document.getElementById('publicGallery');
            try {
                // Ye Admin panel se upload hui photos fetch karega
                const res = await fetch('/api/gallery');
                const photos = await res.json();

                container.innerHTML = '';

                if (!Array.isArray(photos) || photos.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-16 bg-gray-50 rounded-2xl border border-gray-200">
                            <i class="fa-solid fa-camera text-5xl text-gray-300 mb-4"></i>
                            <p class="text-gray-500 text-lg">More photos coming soon!</p>
                        </div>`;
                    return;
                }

                // Save photos array for Lightbox
                allImages = photos;

                // Loop to show photos in grid
                photos.forEach((p, index) => {
                    container.innerHTML += `
                        <div class="overflow-hidden rounded-xl shadow-sm hover:shadow-xl cursor-pointer group relative bg-gray-100" onclick="openLightbox(${index})">
                            <img src="${p.image}" alt="Camp Photo" class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500">
                            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 transition duration-300 flex items-center justify-center">
                                <i class="fa-solid fa-magnifying-glass-plus text-white opacity-0 group-hover:opacity-100 text-3xl transform scale-50 group-hover:scale-100 transition duration-300"></i>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = "<p class='col-span-full text-center text-red-500 py-10'>Unable to load gallery at the moment. Please try again later.</p>";
            }
        }

        // --- Lightbox Functions ---
        function openLightbox(index) {
            if (allImages.length === 0) return;
            currentIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Background scroll band karne ke liye
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            document.body.style.overflow = 'auto'; // Background scroll chalu
        }

        function changeImage(step) {
            if (allImages.length === 0) return;
            
            currentIndex += step;
            
            // Loop feature: Agar end par next kiya toh start par aajaye
            if (currentIndex >= allImages.length) {
                currentIndex = 0; 
            } else if (currentIndex < 0) {
                currentIndex = allImages.length - 1;
            }
            
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const img = document.getElementById('lightboxImg');
            // Halka sa fade effect
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = allImages[currentIndex].image;
                img.style.opacity = 1;
            }, 150);
        }

        // Keyboard Shortcuts (Arrows & Escape)
        document.addEventListener('keydown', function(event) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('hidden')) {
                if (event.key === "Escape") {
                    closeLightbox();
                } else if (event.key === "ArrowRight") {
                    changeImage(1);
                } else if (event.key === "ArrowLeft") {
                    changeImage(-1);
                }
            }
        });

        // Load gallery on start
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
