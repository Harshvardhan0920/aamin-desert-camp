<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aamin Desert Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-yellow-700">
                <i class="fa-solid fa-campground"></i>
                Aamin Desert Camp
            </a>

            <nav class="hidden md:flex items-center space-x-6 font-semibold text-gray-600">
                <a href="index.html" class="hover:text-yellow-600 transition">Home</a>
                <a href="about.html" class="hover:text-yellow-600 transition">About Us</a>
                <a href="gallery.html" class="text-yellow-600 border-b-2 border-yellow-600 pb-1">Gallery</a>
                <a href="rooms.html" class="hover:text-yellow-600 transition">Rooms</a>
                <a href="contact.html" class="hover:text-yellow-600 transition">Contact</a>
                <a href="booking.html" class="bg-yellow-600 text-white px-6 py-2 rounded-full hover:bg-yellow-700 transition shadow-md">Book Now</a>
            </nav>

            <button id="menu-btn" class="md:hidden text-2xl text-gray-700 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t pb-4 px-4 flex flex-col space-y-4 font-semibold text-gray-600">
            <a href="index.html" class="block pt-3">Home</a>
            <a href="about.html" class="block">About Us</a>
            <a href="gallery.html" class="block text-yellow-600">Gallery</a>
            <a href="rooms.html" class="block">Rooms</a>
            <a href="contact.html" class="block">Contact</a>
            <a href="booking.html" class="block bg-yellow-600 text-white text-center py-2 rounded-md shadow">Book Now</a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        <h2 class="text-4xl font-bold text-center mb-10 text-gray-800">Our Gallery</h2>
        <div id="publicGallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-center col-span-full text-gray-500 font-medium">Loading photos...</p>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-95 z-[9999] hidden flex flex-col items-center justify-center select-none">
        
        <button onclick="closeLightbox()" class="absolute top-4 right-6 text-white text-5xl hover:text-gray-300 transition focus:outline-none z-50">
            &times;
        </button>

        <div class="relative flex items-center justify-center w-full max-w-6xl h-full px-2">
            
            <button onclick="changeImage(-1); event.stopPropagation();" class="absolute left-2 md:left-8 text-white text-4xl md:text-6xl hover:text-yellow-500 transition focus:outline-none z-50 bg-black bg-opacity-40 hover:bg-opacity-80 w-14 h-14 md:w-20 md:h-20 flex items-center justify-center rounded-full">
                &#10094;
            </button>

            <img id="lightboxImg" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl">

            <button onclick="changeImage(1); event.stopPropagation();" class="absolute right-2 md:right-8 text-white text-4xl md:text-6xl hover:text-yellow-500 transition focus:outline-none z-50 bg-black bg-opacity-40 hover:bg-opacity-80 w-14 h-14 md:w-20 md:h-20 flex items-center justify-center rounded-full">
                &#10095;
            </button>
        </div>
    </div>

    <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
        <p>&copy; 2026 Aamin Desert Camp. All rights reserved.</p>
    </footer>

    <script>
        let allImages = [];
        let currentIndex = 0;

        // 1. Fetch & Load Gallery
        async function loadGallery() {
            const container = document.getElementById('publicGallery');
            try {
                const res = await fetch('/api/gallery');
                const photos = await res.json();

                container.innerHTML = ''; // Clear loading text

                if (Array.isArray(photos) && photos.length > 0) {
                    allImages = photos;
                    photos.forEach((p, index) => {
                        container.innerHTML += `
                            <div class="overflow-hidden rounded-xl shadow-md cursor-pointer group" onclick="openLightbox(${index})">
                                <img src="${p.image}" alt="Camp Photo" class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500">
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p class='col-span-full text-center text-gray-500'>No photos found in database yet.</p>";
                }
            } catch (error) {
                console.error("Error loading gallery:", error);
                container.innerHTML = "<p class='col-span-full text-center text-red-500'>Server error while loading photos.</p>";
            }
        }

        // 2. Mobile Menu Toggle
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobileMenu');

            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
            
            // Call the function to load photos
            loadGallery();
        });

        // 3. Lightbox (Popup Viewer) Logic
        function openLightbox(index) {
            if (allImages.length === 0) return;
            currentIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.remove('hidden');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }

        function changeImage(step) {
            if (allImages.length === 0) return;
            
            currentIndex += step;
            
            // Loop feature: agar last photo par next dabaye, toh 1st par aa jaye
            if (currentIndex >= allImages.length) {
                currentIndex = 0; 
            } else if (currentIndex < 0) {
                currentIndex = allImages.length - 1;
            }
            
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const img = document.getElementById('lightboxImg');
            img.src = allImages[currentIndex].image;
        }

        // Keyboard Shortcut (Bonus: Arrows chalane ke liye keyboard ka use)
        document.addEventListener('keydown', function(event) {
            const lightbox = document.getElementById('lightbox');
            // Check if lightbox is open
            if (!lightbox.classList.contains('hidden')) {
                if (event.key === "Escape") {
                    closeLightbox();
                } else if (event.key === "ArrowRight") {
                    changeImage(1);
                } else if (event.key === "ArrowLeft") {
                    changeImage(-1);
                }
            }
        });
    </script>
</body>
</html>
